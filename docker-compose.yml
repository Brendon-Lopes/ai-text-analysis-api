services:
  api:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Which summarization model to use: "distilbart" or "flan-t5"
      # To use flan-t5, also pre-download it in the Dockerfile.
      - SUMMARIZATION_MODEL=distilbart
